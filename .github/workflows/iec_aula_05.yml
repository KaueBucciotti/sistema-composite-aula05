name: CI/CD Aula 05 - Sistema Composite

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Análise com SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=KaueBucciotti_sistema-composite-aula05
            -Dsonar.organization=kauebucciotti
            -Dsonar.sources=.
            -Dsonar.python.version=3.11
            -Dsonar.exclusions=tests/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2

      - name: Iniciar Python para Auditoria
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dependency Audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln CVE-2026-4539

  test:
    needs: security
    strategy: 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11'] 
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Iniciar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Executar Testes (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/

      - name: Executar Testes (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PYTHONPATH += ";."
          pytest tests/

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Server
        run: echo "Deploy do Sistema de Pedidos finalizado com sucesso!"
        